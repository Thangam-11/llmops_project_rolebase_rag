global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Matches your existing working config — job "fastapi", target api:8001
  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8001"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
