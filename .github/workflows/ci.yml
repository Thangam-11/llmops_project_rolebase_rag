name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.10"

jobs:

  ######################################
  # Lint & Type Checking
  ######################################
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff Lint
        run: |
          ruff check .

      - name: MyPy
        run: |
          mypy src --ignore-missing-imports

  ######################################
  # Unit Tests
  ######################################
  unit-tests:

    runs-on: ubuntu-latest

    needs: lint

    services:

      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: role_based_rag

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: role_based_rag
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

      DATABASE_URL: postgresql+asyncpg://postgres:admin@localhost:5432/role_based_rag

      SECRET_KEY: testing-secret

      OPENROUTER_API_KEY: dummy

      QDRANT_URL: https://dummy-url

      QDRANT_API_KEY: dummy

      LANGSMITH_ENABLED: false

      EVALUATION_ENABLED: false

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Unit Tests
        run: |
          pytest tests/unit -v \
          --cov=src \
          --cov-report=xml

      - name: Upload Coverage

        uses: codecov/codecov-action@v4

        with:
          file: coverage.xml

  ######################################
  # Integration Tests
  ######################################
  integration-tests:

    runs-on: ubuntu-latest

    needs: unit-tests

    services:

      postgres:

        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: role_based_rag

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:

      DATABASE_URL: postgresql+asyncpg://postgres:admin@localhost:5432/role_based_rag

      SECRET_KEY: testing-secret

      OPENROUTER_API_KEY: dummy

      QDRANT_URL: https://dummy-url

      QDRANT_API_KEY: dummy

      LANGSMITH_ENABLED: false

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Integration Tests
        run: |
          pytest tests/integration -v

  ######################################
  # Docker Build
  ######################################

  docker-build:

    runs-on: ubuntu-latest

    needs:

      - lint

      - integration-tests

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image

        uses: docker/build-push-action@v6

        with:

          context: .

          push: false

          load: true

          tags: role-based-rag:latest

      - name: Verify Docker Image

        run: |

          docker images

  ######################################
  # Security Scan
  ######################################

  security:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit

        run: |

          pip install bandit

      - name: Run Bandit

        run: |

          bandit -r src -ll

      - name: TruffleHog

        uses: trufflesecurity/trufflehog@v3.88.0

        with:

          path: ./
          base: HEAD~1
          head: HEAD
