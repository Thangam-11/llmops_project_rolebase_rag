name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@localhost:5432/role_based_rag
      OPENROUTER_API_KEY: dummy
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: dummy
      SECRET_KEY: dummy-secret-key
      LANGSMITH_API_KEY: dummy
      ENVIRONMENT: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy "bandit[sarif]"

      - name: Ruff Lint
        run: |
          ruff check .

      - name: MyPy Type Check
        run: |
          mypy .

      - name: Run Unit Tests
        run: |
          pytest tests/unit_test -v

      - name: Bandit Security Scan
        run: |
          bandit -r . -f sarif -o bandit-results.sarif -x ./tests,./venv,./.venv
        continue-on-error: true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          path: .
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Build Docker Image
        run: |
          docker build -t role-based-rag:${{ github.sha }} .

      - name: Run Container for Smoke Test
        run: |
          docker run -d \
            --name rag-smoke-test \
            --network host \
            -e DATABASE_URL="${{ env.DATABASE_URL }}" \
            -e OPENROUTER_API_KEY="${{ env.OPENROUTER_API_KEY }}" \
            -e QDRANT_URL="${{ env.QDRANT_URL }}" \
            -e QDRANT_API_KEY="${{ env.QDRANT_API_KEY }}" \
            -e SECRET_KEY="${{ env.SECRET_KEY }}" \
            -e LANGSMITH_API_KEY="${{ env.LANGSMITH_API_KEY }}" \
            -e ENVIRONMENT="${{ env.ENVIRONMENT }}" \
            role-based-rag:${{ github.sha }}

      - name: Wait for App to Be Ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "App failed to become ready in time"
          docker logs rag-smoke-test
          exit 1

      - name: Smoke Test - Health Endpoint
        run: |
          curl -sf http://localhost:8000/health | tee /dev/stderr | grep -qi "ok\|healthy" \
            || (echo "Health check response did not indicate healthy status" && exit 1)

      - name: Dump Container Logs (always, for debugging)
        if: always()
        run: docker logs rag-smoke-test || true

      - name: Stop and Remove Container
        if: always()
        run: |
          docker stop rag-smoke-test || true
          docker rm rag-smoke-test || true
