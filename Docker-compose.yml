services:

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: role-rag-postgres
    restart: unless-stopped

    # Gives Postgres up to 30s to finish its shutdown checkpoint before
    # Docker force-kills it with SIGKILL (default is only 10s).
    stop_grace_period: 30s

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: role-rag-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HF_HOME: /home/appuser/.cache/huggingface
    volumes:
      # Persist the ~400MB embedding model across rebuilds/restarts instead
      # of re-downloading it from HF Hub every time.
      - hf_cache:/home/appuser/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Requires a GET /health route on the FastAPI app returning 200.
    # Without it this always reports unhealthy, and streamlit/prometheus/grafana
    # (which depend on api being healthy) will never start.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Streamlit Frontend
  # ─────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: role-rag-streamlit
    ports:
      - "8501:8501"
    environment:
      ROLE_RAG_API_BASE: http://api:8001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Prometheus
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: role-rag-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./src/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Grafana
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: role-rag-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  hf_cache: